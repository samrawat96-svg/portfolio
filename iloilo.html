<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iloilo

  </title>
  <link href="https://fonts.googleapis.com/css2?family=Jaro&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── LOADER OVERLAY ── */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
    }

    #logo-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .flair {
      position: fixed;
      opacity: 0;
      width: 48px; height: 48px;
      pointer-events: none;
      top: 0; left: 0;
      z-index: 9100;
    }

    #cursor {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #d4f040;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      mix-blend-mode: screen;
    }

    /* ── PAGE (hidden until loader exits) ── */
    #page {
      opacity: 0;
      pointer-events: none;
    }

    body { background: #0a0a0a; font-family: 'Jaro', sans-serif; }

    /* BACK BUTTON */
    .back-btn {
      position: fixed;
      top: 24px; left: 24px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px 10px 16px;
      background: rgba(10,10,10,0.55);
      backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      color: #f0ece4;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      overflow: hidden;
      font-family: 'Jaro', sans-serif;
    }
    .back-btn .fill {
      position: absolute; inset: 0;
      background: #c9ff47;
      border-radius: 100px;
      transform: scaleX(0);
      transform-origin: left;
      z-index: 0;
    }
    .back-btn svg, .back-btn span { position: relative; z-index: 1; }
    .back-btn svg {
      width: 15px; height: 15px;
      stroke: currentColor; fill: none;
      stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* NEXT BUTTON */
    .next-btn {
      position: fixed;
      top: 24px; right: 24px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px 10px 22px;
      background: rgba(10,10,10,0.55);
      backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 100px;
      color: #f0ece4;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      overflow: hidden;
      font-family: 'Jaro', sans-serif;
    }
    .next-btn .fill {
      position: absolute; inset: 0;
      background: #c9ff47;
      border-radius: 100px;
      transform: scaleX(0);
      transform-origin: right;
      z-index: 0;
    }
    .next-btn svg, .next-btn span { position: relative; z-index: 1; }
    .next-btn svg {
      width: 15px; height: 15px;
      stroke: currentColor; fill: none;
      stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* IMAGES */
    .gallery { display: block; width: 100vw; }
    .gallery img {
      display: block;
      width: 100vw;
      height: auto;
      margin: 0; padding: 0;
    }

    /* IMAGE PROTECTION */
    .gallery img {
      -webkit-user-select: none;
      user-select: none;
      pointer-events: none;
    }
    .gallery {
      position: relative;
    }
    .protect-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      user-select: none;
    }

    /* SCREENSHOT PROTECTION */
    /* This hides content when screen is captured via print/screenshot APIs */
    @media print {
      body * { visibility: hidden !important; }
      body::after {
        content: '';
        visibility: visible !important;
        display: block;
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 99999;
      }
    }

    /* CSS-only screenshot darkening on supported browsers */
    .ss-shield {
      position: fixed;
      inset: 0;
      z-index: 99998;
      pointer-events: none;
      background: transparent;
    }

    @media (display-mode: standalone) {
      .ss-shield { background: #000; }
    }


    /* ══ SNIP TOOL / SCREEN CAPTURE PROTECTION ══
       Two stacked layers with mix-blend-mode:
       - base layer: black (visible on real screen as transparent due to blend)
       - top layer:  white overlay with 'difference' blend
       On a real display these cancel out = content visible.
       In a screenshot/capture tool the blend is flattened = BLACK.
    */
    #capture-shield {
      position: fixed;
      inset: 0;
      z-index: 999997;
      pointer-events: none;
      background: #000000;
      mix-blend-mode: difference;
      display: block;
    }

  </style>
</head>

<script>
// ══════════════════════════
// LOADER — logo animation
// ══════════════════════════
const E = "power4.inOut", DUR = 0.95, HOLD = 0.55;
const gA = document.getElementById("gA");
const gB = document.getElementById("gB");
const gC = document.getElementById("gC");
const bar1 = document.getElementById("bar1");
const bar2 = document.getElementById("bar2");

const logoLoop = gsap.timeline({ repeat: -1, defaults: { ease: E, duration: DUR } });
logoLoop
  .to(gA,   { x: -137 })
  .to(gB,   { x: 137 }, "<").to(gC, { x: 137 }, "<")
  .to(bar1, { attr: { x: 372, width: 387 } }, "<")
  .to(bar2, { attr: { x: 1317 } }, "<")
  .to({}, { duration: HOLD })
  .to(gA,   { x: 0 })
  .to(gB,   { x: 0 }, "<").to(gC, { x: 0 }, "<")
  .to(bar1, { attr: { x: 509, width: 114 } }, "<")
  .to(bar2, { attr: { x: 1180 } }, "<")
  .to({}, { duration: HOLD })
  .to(gA,   { x: -143 })
  .to(gB,   { x: -143 }, "<").to(gC, { x: 144 }, "<")
  .to(bar1, { attr: { x: 366 } }, "<")
  .to(bar2, { attr: { x: 1037, width: 403 } }, "<")
  .to({}, { duration: HOLD })
  .to(gA,   { x: 0 })
  .to(gB,   { x: 0 }, "<").to(gC, { x: 0 }, "<")
  .to(bar1, { attr: { x: 509 } }, "<")
  .to(bar2, { attr: { x: 1180, width: 116 } }, "<")
  .to({}, { duration: HOLD });

// ══════════════════════════
// FLAIR mouse trail
// ══════════════════════════
const cursor = document.getElementById("cursor");
const flair  = gsap.utils.toArray(".flair");
const wrap   = gsap.utils.wrap(0, flair.length);
const colors = ["#d4f040","#FFB347","#FF6B1A","#FFC869","#FF8C42","#ffffff","#FFDA79"];
let idx = 0;
let mousePos = { x: window.innerWidth/2, y: window.innerHeight/2 };
let lastPos  = { ...mousePos };

window.addEventListener("mousemove", e => {
  mousePos = { x: e.clientX, y: e.clientY };
  gsap.to(cursor, { left: e.clientX, top: e.clientY, duration: 0.1 });
});

function spawnFlair() {
  const i   = wrap(idx);
  const el  = flair[i];
  const col = colors[idx % colors.length];
  gsap.killTweensOf(el);
  gsap.set(el, { clearProps: "all" });
  gsap.set(el, { opacity:1, left: mousePos.x, top: mousePos.y, xPercent:-50, yPercent:-50 });
  const sym = document.querySelector(el.querySelector("use").getAttribute("href"));
  if (sym) sym.querySelectorAll("[fill]").forEach(n => n.setAttribute("fill", col));
  gsap.timeline()
    .from(el, { opacity:0, scale:0, ease:"elastic.out(1,0.3)", duration:0.6 })
    .to(el,   { rotation:`random([-360,360])`, duration:0.6 }, "<")
    .to(el,   { y:"110vh", ease:"back.in(0.4)", duration:1.1 }, 0);
  idx++;
}

gsap.ticker.add(() => {
  if (Math.hypot(lastPos.x - mousePos.x, lastPos.y - mousePos.y) > 90) {
    spawnFlair();
    lastPos = { ...mousePos };
  }
});

// ══════════════════════════
// EXIT LOADER when page ready
// ══════════════════════════
function exitLoader() {
  logoLoop.pause();
  const loader = document.getElementById("loader");
  const page   = document.getElementById("page");

  // stop cursor tracking on loader
  gsap.ticker.remove(gsap.ticker.lagSmoothing);

  gsap.timeline()
    .to(loader, {
      opacity: 0,
      duration: 0.7,
      ease: "power2.inOut",
      onComplete: () => {
        loader.style.display = "none";
        document.body.style.cursor = "auto";
        cursor.style.display = "none";
      }
    })
    .to(page, {
      opacity: 1,
      duration: 0.6,
      ease: "power2.out",
      onStart: () => { page.style.pointerEvents = "all"; }
    }, "-=0.2");
}

// Fire when all images + fonts loaded
window.addEventListener("load", () => {
  // minimum display time: 2s so the loader is always seen
  const minTime = 2000;
  const elapsed = performance.now();
  const remaining = Math.max(0, minTime - elapsed);
  setTimeout(exitLoader, remaining);
});

// ══════════════════════════
// BACK BUTTON — GSAP hover
// ══════════════════════════
const btn  = document.getElementById("backBtn");
const fill = btn.querySelector(".fill");
const svg  = btn.querySelector("svg");
const txt  = btn.querySelector("span");

btn.addEventListener("mouseenter", () => {
  gsap.to(fill, { scaleX:1, duration:0.35, ease:"power2.out" });
  gsap.to([svg,txt], { color:"#0a0a0a", duration:0.2 });
  gsap.to(svg, { x:-3, duration:0.3, ease:"power2.out" });
});
btn.addEventListener("mouseleave", () => {
  gsap.to(fill, { scaleX:0, duration:0.3, ease:"power2.in" });
  gsap.to([svg,txt], { color:"#f0ece4", duration:0.2 });
  gsap.to(svg, { x:0, duration:0.3 });
});
btn.addEventListener("mousedown", () => gsap.to(btn, { scale:0.93, duration:0.1 }));
btn.addEventListener("mouseup",   () => gsap.to(btn, { scale:1, duration:0.3, ease:"elastic.out(1,0.5)" }));

// ══════════════════════════
// NEXT BUTTON — GSAP hover
// ══════════════════════════
const nBtn  = document.getElementById("nextBtn");
const nFill = nBtn.querySelector(".fill");
const nSvg  = nBtn.querySelector("svg");
const nTxt  = nBtn.querySelector("span");

nBtn.addEventListener("mouseenter", () => {
  gsap.to(nFill, { scaleX:1, duration:0.35, ease:"power2.out" });
  gsap.to([nSvg,nTxt], { color:"#0a0a0a", duration:0.2 });
  gsap.to(nSvg, { x:3, duration:0.3, ease:"power2.out" });
});
nBtn.addEventListener("mouseleave", () => {
  gsap.to(nFill, { scaleX:0, duration:0.3, ease:"power2.in" });
  gsap.to([nSvg,nTxt], { color:"#f0ece4", duration:0.2 });
  gsap.to(nSvg, { x:0, duration:0.3 });
});
nBtn.addEventListener("mousedown", () => gsap.to(nBtn, { scale:0.93, duration:0.1 }));
nBtn.addEventListener("mouseup",   () => gsap.to(nBtn, { scale:1, duration:0.3, ease:"elastic.out(1,0.5)" }));
</script>

<script>
// ══════════════════════════
// IMAGE PROTECTION
// ══════════════════════════

// Block right-click
document.addEventListener("contextmenu", e => e.preventDefault());

// Block drag
document.addEventListener("dragstart", e => e.preventDefault());

// Block common copy/save shortcuts
document.addEventListener("keydown", e => {
  const blocked = (
    (e.ctrlKey || e.metaKey) && ["s","u","p","a","c"].includes(e.key.toLowerCase())
  ) || e.key === "F12" || e.key === "PrintScreen";
  if (blocked) e.preventDefault();
});

// Block inspect via key combo
document.addEventListener("keydown", e => {
  if (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});

// Transparent overlay on each image to block pointer events
document.querySelectorAll(".gallery img").forEach(img => {
  const wrap = document.createElement("div");
  wrap.style.cssText = "position:relative;display:block;line-height:0;";
  img.parentNode.insertBefore(wrap, img);
  wrap.appendChild(img);
  const shield = document.createElement("div");
  shield.style.cssText = "position:absolute;inset:0;z-index:10;cursor:default;";
  shield.addEventListener("contextmenu", e => e.preventDefault());
  shield.addEventListener("dragstart", e => e.preventDefault());
  wrap.appendChild(shield);
});
</script>

<script>
// ══════════════════════════════════════════
// SCREENSHOT DETECTION & SCREEN BLACK
// ══════════════════════════════════════════

const blackout = document.createElement("div");
blackout.id = "blackout";
blackout.style.cssText = `
  position: fixed; inset: 0; background: #000;
  z-index: 999999; display: none; pointer-events: none;
`;
document.body.appendChild(blackout);

function showBlackout(ms = 1200) {
  blackout.style.display = "block";
  setTimeout(() => { blackout.style.display = "none"; }, ms);
}

// ── 1. visibilitychange — fires when screen recorder / screenshot tool
//       briefly steals focus or locks the screen
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") showBlackout(1500);
});

// ── 2. window blur — screenshot tools on desktop briefly steal focus
window.addEventListener("blur", () => showBlackout(1200));

// ── 3. PrintScreen key (desktop)
document.addEventListener("keyup", e => {
  if (e.key === "PrintScreen" || e.code === "PrintScreen") {
    // Overwrite clipboard with black image
    showBlackout(1500);
    // Attempt to clear clipboard
    try {
      navigator.clipboard.writeText("").catch(() => {});
    } catch(e) {}
  }
});

// ── 4. Screen Capture API detection (Chrome/Edge)
//       When getDisplayMedia is called, the page gets blacked out
if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
  const _orig = navigator.mediaDevices.getDisplayMedia.bind(navigator.mediaDevices);
  navigator.mediaDevices.getDisplayMedia = async function(opts) {
    showBlackout(3000);
    return _orig(opts);
  };
}

// ── 5. Page visibility / focus for mobile screenshots
//       On mobile, taking a screenshot briefly backgrounds the browser
window.addEventListener("focusout", () => showBlackout(1000));
window.addEventListener("pagehide", () => showBlackout(2000));

// ── 6. CSS print media trick — black page on print/screenshot shortcut
window.addEventListener("beforeprint", () => {
  document.body.style.visibility = "hidden";
  setTimeout(() => { document.body.style.visibility = ""; }, 2000);
});
window.addEventListener("afterprint",  () => {
  document.body.style.visibility = "";
});

// ── 7. Periodic screen dim when window not focused (extra layer)
let focusTimer;
window.addEventListener("blur", () => {
  focusTimer = setTimeout(() => showBlackout(800), 100);
});
window.addEventListener("focus", () => {
  clearTimeout(focusTimer);
  blackout.style.display = "none";
});
</script>
